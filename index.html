<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Robot Thám Hiểm - Bản đồ + Camera + Điều khiển</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1300px; width: 100%; }
        .row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; justify-content: center; }
        .card { background: #161b22; border-radius: 16px; padding: 15px; border: 1px solid #30363d; }
        .sensor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; flex: 1; }
        .sensor { text-align: center; }
        .sensor-value { font-size: 1.8rem; font-weight: bold; color: #3fb950; }
        .camera-box { width: 640px; height: 360px; background: #000; border-radius: 16px; overflow: hidden; border: 2px solid #3fb950; }
        .camera-box iframe { width: 100%; height: 100%; border: none; }
        .map-container { width: 500px; height: 500px; background: #010409; border-radius: 12px; overflow: hidden; }
        canvas { width: 100%; height: 100%; background: #1a1f2e; }
        .controls { display: flex; flex-direction: column; gap: 12px; min-width: 200px; }
        button { background: #21262d; border: none; color: white; padding: 12px 20px; border-radius: 40px; font-size: 1rem; cursor: pointer; transition: 0.1s; font-weight: bold; }
        button:active { transform: scale(0.96); }
        .dpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .dpad button { padding: 15px; font-size: 1.4rem; }
        .btn-stop { background: #8e2a2a; }
        .btn-auto { background: #238636; }
        .btn-manual { background: #1f6feb; }
        .log-box { background: #010409; border-radius: 12px; padding: 10px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; }
        .alert-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .alert { padding: 8px 15px; border-radius: 20px; font-weight: bold; display: none; }
        .alert-fire { background: #ff4755cc; color: white; }
        .alert-gas { background: #f39c12cc; color: black; }
        .alert-tilt { background: #8e44adcc; color: white; }
        @media (max-width: 700px) {
            .camera-box { width: 100%; height: auto; aspect-ratio: 16/9; }
            .map-container { width: 100%; height: auto; aspect-ratio: 1/1; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="alert-bar">
        <div id="fireAlert" class="alert alert-fire">🔥 PHÁT HIỆN LỬA</div>
        <div id="gasAlert" class="alert alert-gas">⚠️ KHÍ GAS CAO</div>
        <div id="tiltAlert" class="alert alert-tilt">📐 XE BỊ NGHIÊNG</div>
    </div>

    <div class="row">
        <div class="sensor-grid card">
            <div class="sensor"><div>🌡️ Nhiệt độ MPU</div><div class="sensor-value" id="temp">--</div>°C</div>
            <div class="sensor"><div>💨 Nồng độ khí gas</div><div class="sensor-value" id="gas">--</div></div>
            <div class="sensor"><div>📡 Góc Yaw</div><div class="sensor-value" id="yaw">--</div>°</div>
            <div class="sensor"><div>📏 Cản trước</div><div class="sensor-value" id="distF">--</div>cm</div>
        </div>
    </div>

    <div class="row">
        <div class="camera-box card">
            <!-- Thay YOUR_NINJA_ID bằng ID thật từ VDO.Ninja -->
            <iframe src="https://vdo.ninja/?view=HpAFsTa&autoplay=1&muted=1&clean&style=1" allow="autoplay; camera; microphone"></iframe>
        </div>
        <div class="map-container card">
            <canvas id="mapCanvas" width="500" height="500"></canvas>
        </div>
        <div class="controls card">
            <div class="dpad">
                <div></div><button id="btnF" onpointerdown="sendCmd('F')" onpointerup="sendCmd('S')" onpointerleave="sendCmd('S')">▲</button><div></div>
                <button id="btnL" onpointerdown="sendCmd('L')" onpointerup="sendCmd('S')" onpointerleave="sendCmd('S')">◀</button>
                <button id="btnStop" class="btn-stop" onclick="sendCmd('S')">■</button>
                <button id="btnR" onpointerdown="sendCmd('R')" onpointerup="sendCmd('S')" onpointerleave="sendCmd('S')">▶</button>
                <div></div><button id="btnB" onpointerdown="sendCmd('B')" onpointerup="sendCmd('S')" onpointerleave="sendCmd('S')">▼</button><div></div>
            </div>
            <button id="btnAuto" class="btn-auto" onclick="sendCmd('A')">🤖 CHẾ ĐỘ TỰ HÀNH</button>
            <button id="btnManual" class="btn-manual" onclick="sendCmd('M')">🕹️ CHẾ ĐỘ ĐIỀU KHIỂN TAY</button>
            <button id="btnClear" class="btn-manual" onclick="sendCmd('C')">🔄 CLEAR CẢNH BÁO NGHIÊNG</button>
        </div>
    </div>

    <div class="log-box card" id="sysLog">> Hệ thống sẵn sàng. Đang kết nối MQTT...</div>
    <footer style="font-size:0.7rem; margin-top:15px; text-align:center;">⚡ Robot tự hành lập bản đồ | Camera IP VDO.Ninja | Điều khiển qua MQTT</footer>
</div>

<script>
    // ========== CẤU HÌNH MQTT ==========
    const client = new Paho.MQTT.Client("broker.hivemq.com", 8884, "web_" + Math.random().toString(36).substr(2, 8));
    let mapData = { robotX: 12, robotY: 12, grid: [] };
    const canvas = document.getElementById("mapCanvas");
    const ctx = canvas.getContext("2d");
    const cellW = canvas.width / 25, cellH = canvas.height / 25;

    // Vẽ bản đồ grid
    function drawMap() {
        if (!mapData.grid || mapData.grid.length === 0) {
            // Vẽ lưới trống
            ctx.fillStyle = "#21262d";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#30363d";
            for (let i = 0; i <= 25; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellW, 0);
                ctx.lineTo(i * cellW, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * cellH);
                ctx.lineTo(canvas.width, i * cellH);
                ctx.stroke();
            }
            return;
        }
        for (let i = 0; i < 25; i++) {
            for (let j = 0; j < 25; j++) {
                let val = mapData.grid[i * 25 + j];
                if (val === '1') ctx.fillStyle = "#2ea043";      // đã đi qua
                else if (val === '2') ctx.fillStyle = "#da3633"; // vật cản
                else ctx.fillStyle = "#21262d";                  // chưa biết
                ctx.fillRect(j * cellW, i * cellH, cellW - 1, cellH - 1);
            }
        }
        // Vẽ vị trí robot
        ctx.fillStyle = "#f39c12";
        let rx = mapData.robotY * cellW;
        let ry = mapData.robotX * cellH;
        ctx.beginPath();
        ctx.arc(rx + cellW / 2, ry + cellH / 2, cellW / 3, 0, 2 * Math.PI);
        ctx.fill();
    }

    // Gửi lệnh MQTT
    function sendCmd(cmd) {
        if (client.isConnected()) {
            const msg = new Paho.MQTT.Message(cmd);
            msg.destinationName = "duy_robot_2026/control";
            client.send(msg);
        } else {
            addLog("❌ Mất kết nối MQTT");
        }
    }

    // Thêm log
    function addLog(msg) {
        const logDiv = document.getElementById("sysLog");
        const p = document.createElement("div");
        p.innerText = "> " + msg;
        logDiv.appendChild(p);
        logDiv.scrollTop = logDiv.scrollHeight;
        if (logDiv.children.length > 20) logDiv.removeChild(logDiv.children[0]);
    }

    // Xử lý tin nhắn MQTT đến
    client.onMessageArrived = (msg) => {
        const topic = msg.destinationName;
        const payload = msg.payloadString;
        if (topic.includes("duy_robot_2026/temp")) document.getElementById("temp").innerText = payload;
        if (topic.includes("duy_robot_2026/gas")) document.getElementById("gas").innerText = payload;
        if (topic.includes("duy_robot_2026/yaw")) document.getElementById("yaw").innerText = payload;
        if (topic.includes("duy_robot_2026/distF")) document.getElementById("distF").innerText = payload;
        if (topic.includes("alert/fire")) {
            const el = document.getElementById("fireAlert");
            el.style.display = payload === "1" ? "block" : "none";
            if (payload === "1") addLog("🔥 Cảnh báo: PHÁT HIỆN LỬA!");
        }
        if (topic.includes("alert/gas")) {
            const el = document.getElementById("gasAlert");
            el.style.display = payload === "1" ? "block" : "none";
            if (payload === "1") addLog("⚠️ Cảnh báo: NỒNG ĐỘ GAS CAO!");
        }
        if (topic.includes("alert/tilt")) {
            const el = document.getElementById("tiltAlert");
            el.style.display = payload === "1" ? "block" : "none";
            if (payload === "1") addLog("📐 Cảnh báo: XE BỊ NGHIÊNG! Dừng mọi hoạt động.");
        }
        if (topic.includes("duy_robot_2026/log")) addLog(payload);
        if (topic.includes("duy_robot_2026/map")) {
            try {
                mapData = JSON.parse(payload);
                drawMap();
            } catch (e) {}
        }
    };

    // Kết nối MQTT
    client.connect({
        useSSL: true,
        timeout: 10,
        onSuccess: () => {
            client.subscribe("duy_robot_2026/#");
            addLog("✅ Kết nối MQTT thành công (HiveMQ)");
        },
        onFailure: (err) => {
            addLog("❌ Không thể kết nối MQTT, thử lại sau 5s");
            setTimeout(() => location.reload(), 5000);
        }
    });
</script>
</body>
</html>
