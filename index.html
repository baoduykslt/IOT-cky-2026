<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duy Robot Pro - FPV Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #ff4757; --text: #c9d1d9; --online: #3fb950; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .indicator { padding: 4px 10px; border-radius: 15px; font-size: 0.7rem; font-weight: bold; border: 1px solid currentColor; display: flex; align-items: center; gap: 5px; }
        .on { color: var(--online); background: #23863611; }
        .off { color: #f85149; background: #da363311; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

        .main-layout { display: flex; flex-direction: column; width: 100%; max-width: 1100px; gap: 15px; }
        @media (min-width: 900px) { .main-layout { flex-direction: row; } .left-col { flex: 1.6; } .right-col { flex: 1; } }

        .camera-wrapper { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #30363d; position: relative; }
        .camera-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .sensor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .card { background: var(--card); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #30363d; }
        .card div { font-size: 0.65rem; color: #8b949e; }
        .card span { font-size: 1.3rem; font-weight: bold; color: #fff; }

        .log-box { background: #010409; border: 1px solid #30363d; border-radius: 10px; padding: 10px; font-family: monospace; font-size: 0.8rem; color: #3fb950; height: 130px; overflow-y: auto; margin-top: 10px; white-space: pre-wrap; text-align: left; }

        .ctrl-panel { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #30363d; }
        .dpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        button { background: #21262d; border: 1px solid #30363d; color: #fff; padding: 22px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.4rem; }
        button:active { background: var(--accent); transform: scale(0.9); }
        .btn-stop { background: #8e2a2a; border-color: #f85149; }
        .btn-mode { font-size: 0.8rem; padding: 15px; width: 100%; margin-top: 8px; }

        #fireAlert { background: var(--accent); color: white; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 10px; display: none; animation: blink 0.6s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <header>
        <h2 style="color: var(--accent); margin: 0;">🚒 DUY ROBOT</h2>
        <div style="display:flex; gap:8px;">
            <div id="mqttStatus" class="indicator off"><div class="dot"></div> SERVER: OFF</div>
            <div id="robotStatus" class="indicator off"><div class="dot"></div> ROBOT: OFF</div>
        </div>
    </header>

    <div id="fireAlert">⚠️ CẢNH BÁO: PHÁT HIỆN HỎA HOẠN! ⚠️</div>

    <div class="main-layout">
        <div class="left-col">
            <div class="camera-wrapper">
                <iframe src="https://vdo.ninja/?view=THAY_ID_VDO_NINJA_CUA_DUY&autoplay=1&muted=1&clean&style=1"></iframe>
            </div>
            <div class="sensor-grid">
                <div class="card"><div>Nhiệt độ (MPU)</div><span id="temp">--</span>°C</div>
                <div class="card"><div>Khí Gas (MQ2)</div><span id="gas">--</span></div>
            </div>
            <div class="log-box" id="sysLog">> Đang đợi Robot gửi báo cáo...</div>
        </div>

        <div class="right-col">
            <div class="ctrl-panel">
                <div class="dpad">
                    <div></div><button onpointerdown="send('FORWARD')">▲</button><div></div>
                    <button onpointerdown="send('LEFT')">◀</button>
                    <button class="btn-stop" onclick="send('STOP')">■</button>
                    <button onpointerdown="send('RIGHT')">▶</button>
                    <div></div><button onpointerdown="send('BACK')">▼</button><div></div>
                </div>
                <button id="teachBtn" class="btn-mode" onclick="toggleTeach()" style="background: #8e44ad;">CHẾ ĐỘ DẠY: TẮT</button>
                <button class="btn-mode" style="background: #238636;" onclick="send('REPLAY')">▶ PHÁT LẠI HÀNH TRÌNH</button>
            </div>
        </div>
    </div>

    <script>
        const client = new Paho.MQTT.Client("broker.hivemq.com", 8000, "duy_web_" + Math.random().toString(16).substr(2, 4));
        let lastSeen = 0;

        setInterval(() => { if (Date.now() - lastSeen > 5000) updateStatus("robotStatus", false, "ROBOT: OFF"); }, 1000);

        function updateStatus(id, isOnline, text) {
            const el = document.getElementById(id);
            el.className = isOnline ? "indicator on" : "indicator off";
            el.innerHTML = `<div class="dot"></div> ${text}`;
        }

        client.onMessageArrived = (msg) => {
            const p = msg.payloadString; const t = msg.destinationName;
            if (t === "duy_robot_2026/status") { lastSeen = Date.now(); updateStatus("robotStatus", true, "ROBOT: ON"); }
            if(t.includes("temp")) document.getElementById("temp").innerText = p;
            if(t.includes("gas")) document.getElementById("gas").innerText = p;
            if(t.includes("log")) document.getElementById("sysLog").innerText = p;
            if(t.includes("alert")) document.getElementById("fireAlert").style.display = p.includes("CẢNH BÁO") ? "block" : "none";
        };

        function send(cmd) { if(client.isConnected()) { const m = new Paho.MQTT.Message(cmd); m.destinationName = "duy_robot_2026/control"; client.send(m); } }

        function toggleTeach() {
            let btn = document.getElementById("teachBtn");
            let isTeach = btn.innerText.includes("TẮT");
            btn.innerText = isTeach ? "CHẾ ĐỘ DẠY: BẬT" : "CHẾ ĐỘ DẠY: TẮT";
            send(isTeach ? "TEACH_ON" : "TEACH_OFF");
        }

        client.connect({ onSuccess: () => {
            updateStatus("mqttStatus", true, "SERVER: ON");
            client.subscribe("duy_robot_2026/sensor/#"); client.subscribe("duy_robot_2026/alert");
            client.subscribe("duy_robot_2026/status"); client.subscribe("duy_robot_2026/log");
        }});
    </script>
</body>
</html>
